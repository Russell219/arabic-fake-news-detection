<svg viewBox="0 0 740 820" xmlns="http://www.w3.org/2000/svg" font-family="system-ui, -apple-system, sans-serif">
  <title>Full System Sequential Pipeline — Sarah, Russell, Youssef</title>

  <rect width="740" height="820" fill="#0D1117" rx="12"/>

  <!-- Title -->
  <text x="370" y="32" text-anchor="middle" font-size="14" font-weight="700" fill="#F0F6FC">Full System — Sequential Pipeline</text>
  <text x="370" y="50" text-anchor="middle" font-size="10" fill="#8B949E">A Hybrid AI Framework for Arabic Fake News Detection</text>

  <!-- INPUT -->
  <rect x="270" y="68" width="200" height="44" rx="8" fill="#1F6FEB"/>
  <text x="370" y="86" text-anchor="middle" font-size="12" font-weight="600" fill="#fff">Arabic Claim Input</text>
  <text x="370" y="102" text-anchor="middle" font-size="10" fill="#cce0ff">MSA or Egyptian Dialect</text>

  <line x1="370" y1="112" x2="370" y2="135" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- SARAH BOX -->
  <rect x="60" y="135" width="620" height="120" rx="10" fill="#161B22" stroke="#238636" stroke-width="1.5"/>
  <text x="370" y="157" text-anchor="middle" font-size="12" font-weight="700" fill="#3FB950">System 1 — Sarah · Text Classification</text>
  <text x="370" y="173" text-anchor="middle" font-size="10" fill="#8B949E">MARBERt fine-tuned on Arabic fake news · Compares transformer vs traditional ML (CNN, SVM)</text>

  <rect x="100" y="186" width="155" height="48" rx="6" fill="#0D1117" stroke="#3FB950" stroke-width="1"/>
  <text x="177" y="205" text-anchor="middle" font-size="10" font-weight="600" fill="#3FB950">FAKE_LIKELY</text>
  <text x="177" y="221" text-anchor="middle" font-size="9" fill="#8B949E">High suspicion → investigate</text>
  <text x="177" y="233" text-anchor="middle" font-size="9" fill="#8B949E">→ goes to Russell</text>

  <rect x="292" y="186" width="155" height="48" rx="6" fill="#0D1117" stroke="#E3B341" stroke-width="1"/>
  <text x="369" y="205" text-anchor="middle" font-size="10" font-weight="600" fill="#E3B341">UNCERTAIN</text>
  <text x="369" y="221" text-anchor="middle" font-size="9" fill="#8B949E">Not sure → verify</text>
  <text x="369" y="233" text-anchor="middle" font-size="9" fill="#8B949E">→ goes to Russell</text>

  <rect x="484" y="186" width="155" height="48" rx="6" fill="#0D1117" stroke="#58A6FF" stroke-width="1"/>
  <text x="561" y="205" text-anchor="middle" font-size="10" font-weight="600" fill="#58A6FF">REAL_LIKELY</text>
  <text x="561" y="221" text-anchor="middle" font-size="9" fill="#8B949E">Still retrieves evidence</text>
  <text x="561" y="233" text-anchor="middle" font-size="9" fill="#8B949E">→ goes to Russell</text>

  <line x1="177" y1="234" x2="177" y2="268" stroke="#3FB950" stroke-width="1.5" marker-end="url(#arr-green)"/>
  <line x1="369" y1="234" x2="369" y2="268" stroke="#E3B341" stroke-width="1.5" marker-end="url(#arr-yellow)"/>
  <line x1="561" y1="234" x2="561" y2="268" stroke="#58A6FF" stroke-width="1.5" marker-end="url(#arr-blue)"/>

  <line x1="177" y1="268" x2="370" y2="268" stroke="#555" stroke-width="1"/>
  <line x1="561" y1="268" x2="370" y2="268" stroke="#555" stroke-width="1"/>
  <line x1="370" y1="268" x2="370" y2="285" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- RUSSELL BOX -->
  <rect x="60" y="285" width="620" height="230" rx="10" fill="#161B22" stroke="#1F6FEB" stroke-width="1.5"/>
  <text x="370" y="307" text-anchor="middle" font-size="12" font-weight="700" fill="#58A6FF">System 2A — Russell · RAG Fact-Verification</text>
  <text x="370" y="323" text-anchor="middle" font-size="10" fill="#8B949E">Dialect detection + normalization → dual-bucket cascade → JSON evidence output</text>

  <rect x="80" y="333" width="280" height="90" rx="6" fill="#0D1117" stroke="#1F6FEB" stroke-width="1"/>
  <text x="220" y="351" text-anchor="middle" font-size="10" font-weight="600" fill="#58A6FF">Bucket A — Verified Claims</text>
  <text x="220" y="366" text-anchor="middle" font-size="9" fill="#8B949E">21,001 claims · E5-large cosine</text>
  <rect x="95" y="374" width="115" height="36" rx="4" fill="#0F2A1A"/>
  <text x="152" y="388" text-anchor="middle" font-size="9" font-weight="600" fill="#3FB950">HIGH ≥ 0.86</text>
  <text x="152" y="402" text-anchor="middle" font-size="8" fill="#3FB950">Direct verdict</text>
  <rect x="225" y="374" width="115" height="36" rx="4" fill="#2A1F0A"/>
  <text x="282" y="388" text-anchor="middle" font-size="9" font-weight="600" fill="#E3B341">POSSIBLE ≥ 0.84</text>
  <text x="282" y="402" text-anchor="middle" font-size="8" fill="#E3B341">→ Youssef</text>

  <rect x="380" y="333" width="280" height="90" rx="6" fill="#0D1117" stroke="#8957E5" stroke-width="1"/>
  <text x="520" y="351" text-anchor="middle" font-size="10" font-weight="600" fill="#A371F7">Bucket B — News KB</text>
  <text x="520" y="366" text-anchor="middle" font-size="9" fill="#8B949E">20,687 props · RRF + NER + Rerank</text>
  <rect x="395" y="374" width="115" height="36" rx="4" fill="#1A0F2A"/>
  <text x="452" y="388" text-anchor="middle" font-size="9" font-weight="600" fill="#A371F7">EVIDENCE_FOUND</text>
  <text x="452" y="402" text-anchor="middle" font-size="8" fill="#A371F7">→ Youssef NLI</text>
  <rect x="525" y="374" width="115" height="36" rx="4" fill="#1A1A1A"/>
  <text x="582" y="388" text-anchor="middle" font-size="9" font-weight="600" fill="#8B949E">LOW_CONFIDENCE</text>
  <text x="582" y="402" text-anchor="middle" font-size="8" fill="#8B949E">UNVERIFIED</text>

  <line x1="360" y1="378" x2="380" y2="378" stroke="#555" stroke-width="1" stroke-dasharray="4,2"/>
  <text x="370" y="372" text-anchor="middle" font-size="8" fill="#555">score &lt;0.84</text>

  <rect x="180" y="438" width="380" height="62" rx="6" fill="#0A2A1A" stroke="#238636" stroke-width="1"/>
  <text x="370" y="458" text-anchor="middle" font-size="10" font-weight="600" fill="#3FB950">JSON Output</text>
  <text x="370" y="473" text-anchor="middle" font-size="9" fill="#8B949E">verdict_signal · confidence · bucket_a[] · bucket_b[]</text>
  <text x="370" y="488" text-anchor="middle" font-size="9" fill="#8B949E">sarah_signal · sarah_confidence</text>

  <line x1="370" y1="515" x2="370" y2="538" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- YOUSSEF BOX -->
  <rect x="60" y="538" width="620" height="150" rx="10" fill="#161B22" stroke="#E3B341" stroke-width="1.5"/>
  <text x="370" y="560" text-anchor="middle" font-size="12" font-weight="700" fill="#E3B341">System 2B — Youssef · NLI + Final Verdict</text>
  <text x="370" y="576" text-anchor="middle" font-size="10" fill="#8B949E">xlm-roberta-large-xnli · combines Sarah signal + Russell evidence → final ruling</text>

  <rect x="90" y="586" width="170" height="50" rx="6" fill="#0D1117" stroke="#E3B341" stroke-width="1"/>
  <text x="175" y="606" text-anchor="middle" font-size="9" font-weight="600" fill="#E3B341">NLI on Evidence</text>
  <text x="175" y="620" text-anchor="middle" font-size="8" fill="#8B949E">SUPPORTS / REFUTES</text>
  <text x="175" y="632" text-anchor="middle" font-size="8" fill="#8B949E">NEUTRAL</text>

  <rect x="285" y="586" width="170" height="50" rx="6" fill="#0D1117" stroke="#E3B341" stroke-width="1"/>
  <text x="370" y="606" text-anchor="middle" font-size="9" font-weight="600" fill="#E3B341">Conflict Resolution</text>
  <text x="370" y="620" text-anchor="middle" font-size="8" fill="#8B949E">Sarah vs Russell disagree</text>
  <text x="370" y="632" text-anchor="middle" font-size="8" fill="#8B949E">→ NLI decides</text>

  <rect x="480" y="586" width="170" height="50" rx="6" fill="#0D1117" stroke="#E3B341" stroke-width="1"/>
  <text x="565" y="606" text-anchor="middle" font-size="9" font-weight="600" fill="#E3B341">Confidence Weighting</text>
  <text x="565" y="620" text-anchor="middle" font-size="8" fill="#8B949E">Sarah conf + Russell conf</text>
  <text x="565" y="632" text-anchor="middle" font-size="8" fill="#8B949E">→ weighted final score</text>

  <line x1="370" y1="688" x2="370" y2="710" stroke="#555" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- FINAL OUTPUT -->
  <rect x="160" y="710" width="420" height="60" rx="8" fill="#0A2A1A" stroke="#3FB950" stroke-width="1.5"/>
  <text x="370" y="733" text-anchor="middle" font-size="13" font-weight="700" fill="#3FB950">Final Verdict</text>
  <text x="230" y="755" text-anchor="middle" font-size="12" font-weight="700" fill="#3FB950">TRUE</text>
  <text x="370" y="755" text-anchor="middle" font-size="12" font-weight="700" fill="#F85149">FALSE</text>
  <text x="510" y="755" text-anchor="middle" font-size="12" font-weight="700" fill="#E3B341">UNVERIFIED</text>

  <!-- Legend -->
  <rect x="60" y="784" width="12" height="8" rx="2" fill="#238636"/>
  <text x="78" y="792" font-size="9" fill="#8B949E">Sarah (System 1)</text>
  <rect x="190" y="784" width="12" height="8" rx="2" fill="#1F6FEB"/>
  <text x="208" y="792" font-size="9" fill="#8B949E">Russell (System 2A)</text>
  <rect x="340" y="784" width="12" height="8" rx="2" fill="#E3B341"/>
  <text x="358" y="792" font-size="9" fill="#8B949E">Youssef (System 2B)</text>
  <rect x="490" y="784" width="12" height="8" rx="2" fill="#3FB950"/>
  <text x="508" y="792" font-size="9" fill="#8B949E">Final Output</text>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#555"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#3FB950"/>
    </marker>
    <marker id="arr-yellow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#E3B341"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#58A6FF"/>
    </marker>
  </defs>
</svg>
